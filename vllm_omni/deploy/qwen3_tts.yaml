# Deploy config for Qwen3-TTS — async-chunk streaming layout.
# 2 stages: talker (text → 8-layer RVQ codec) → code2wav (codec → audio).
# Verified on 1x H100-80G GPU (both stages on cuda:0).

async_chunk: true

connectors:
  connector_of_shared_memory:
    name: SharedMemoryConnector
    extra:
      shm_threshold_bytes: 65536
      # Frame-aligned codec streaming transport.
      codec_streaming: true
      # Connector polling / timeout (loop count, sleep seconds).
      connector_get_sleep_s: 0.01
      connector_get_max_wait_first_chunk: 3000
      connector_get_max_wait: 300
      # Match the decoder sliding attention window to avoid
      # chunk-boundary noise.
      codec_chunk_frames: 25
      codec_left_context_frames: 72

edges:
  - from: 0
    to: 1
    window_size: -1

stages:
  - stage_id: 0
    max_num_seqs: 10
    gpu_memory_utilization: 0.3
    enforce_eager: false
    async_scheduling: true
    enable_prefix_caching: false
    max_num_batched_tokens: 512
    max_model_len: 4096
    distributed_executor_backend: "mp"
    devices: "0"
    output_connectors:
      to_stage_1: connector_of_shared_memory
    default_sampling_params:
      temperature: 0.9
      top_k: 50
      max_tokens: 4096
      seed: 42
      repetition_penalty: 1.05

  - stage_id: 1
    max_num_seqs: 1
    gpu_memory_utilization: 0.3
    enforce_eager: true
    async_scheduling: true
    enable_prefix_caching: false
    # Must be divisible by num_code_groups and cover (left_context + chunk).
    # Prefill length is Q * num_frames (e.g. 16 * 2148 = 34368); keep
    # headroom past 32k.
    max_num_batched_tokens: 65536
    # async_chunk appends windows per step; max_model_len must cover the
    # accumulated flat codec stream.
    max_model_len: 65536
    distributed_executor_backend: "mp"
    devices: "0"
    input_connectors:
      from_stage_0: connector_of_shared_memory
    default_sampling_params:
      temperature: 0.0
      top_p: 1.0
      top_k: -1
      max_tokens: 65536
      seed: 42
      repetition_penalty: 1.0
