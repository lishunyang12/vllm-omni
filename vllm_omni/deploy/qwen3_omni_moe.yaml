# Production deploy config for Qwen3-Omni-MoE — CUDA defaults + platform
# overrides. Loaded automatically by the model registry when a user runs
# ``vllm serve Qwen/Qwen3-Omni-30B-A3B-Instruct --omni`` without an
# explicit ``--deploy-config`` flag.
#
# Verified on 2x H100-80G GPUs (stage 0 on cuda:0, stages 1+2 on cuda:1).
#
# CI tests use ``vllm_omni/deploy/ci/qwen3_omni_moe.yaml``, which inherits
# from this file via ``base_config:`` and only overrides the bits that
# need to be smaller for fast CI runs (load_format=dummy, smaller
# max_num_seqs / max_model_len, etc.). The two files are intentionally
# separate so the production default isn't polluted with CI noise; users
# get the real model defaults, CI gets the dummy-weight overrides.

async_chunk: true

connectors:
  connector_of_shared_memory:
    name: SharedMemoryConnector
    extra:
      codec_chunk_frames: 25
      codec_left_context_frames: 25

edges:
  - from: 0
    to: 1
    window_size: -1
  - from: 1
    to: 2
    window_size: -1

stages:
  - stage_id: 0
    gpu_memory_utilization: 0.9
    devices: "0"
    output_connectors:
      to_stage_1: connector_of_shared_memory
    default_sampling_params:
      temperature: 0.4
      top_p: 0.9
      top_k: 1
      max_tokens: 2048
      seed: 42
      repetition_penalty: 1.05

  - stage_id: 1
    gpu_memory_utilization: 0.6
    devices: "1"
    input_connectors:
      from_stage_0: connector_of_shared_memory
    default_sampling_params:
      temperature: 0.9
      top_k: 50
      max_tokens: 4096
      seed: 42
      repetition_penalty: 1.05

  - stage_id: 2
    gpu_memory_utilization: 0.1
    max_num_seqs: 1
    enforce_eager: true
    async_scheduling: false
    max_num_batched_tokens: 51200
    devices: "1"
    default_sampling_params:
      temperature: 0.0
      top_p: 1.0
      top_k: -1
      max_tokens: 65536
      seed: 42
      repetition_penalty: 1.1

platforms:
  npu:
    stages:
      - stage_id: 0
        gpu_memory_utilization: 0.6
        tensor_parallel_size: 2
        devices: "0,1"
      - stage_id: 1
        gpu_memory_utilization: 0.6
        enforce_eager: true
        devices: "2"
      - stage_id: 2
        gpu_memory_utilization: 0.3
        devices: "2"

  rocm:
    stages:
      - stage_id: 0
        enforce_eager: true

  xpu:
    stages:
      - stage_id: 0
        tensor_parallel_size: 4
        enforce_eager: true
        max_cudagraph_capture_size: 0
        devices: "0,1,2,3"
      - stage_id: 1
        enforce_eager: true
        max_cudagraph_capture_size: 0
        devices: "4"
      - stage_id: 2
        gpu_memory_utilization: 0.3
        max_cudagraph_capture_size: 0
        devices: "4"
