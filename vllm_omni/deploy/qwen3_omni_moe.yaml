# Deploy config for Qwen3-Omni-MoE — CUDA defaults + platform overrides.
# All fields here are overridable by CLI.
#
# Sampling defaults live in pipeline.py (default_sampling_params).
# Only add sampling_params here to override those defaults.
#
# Verified on 2x H100-80G GPUs.

stages:
  - stage_id: 0
    engine_args:
      model_arch: Qwen3OmniMoeForConditionalGeneration
      max_num_seqs: 64
      gpu_memory_utilization: 0.9
      enforce_eager: false
      trust_remote_code: true
      engine_output_type: latent
      distributed_executor_backend: "mp"
      enable_prefix_caching: false
      max_num_batched_tokens: 32768
      tensor_parallel_size: 1
      custom_process_next_stage_input_func: vllm_omni.model_executor.stage_input_processors.qwen3_omni.thinker2talker_async_chunk
    runtime:
      devices: "0"

  - stage_id: 1
    engine_args:
      model_arch: Qwen3OmniMoeForConditionalGeneration
      max_num_seqs: 64
      gpu_memory_utilization: 0.6
      enforce_eager: false
      trust_remote_code: true
      engine_output_type: latent
      enable_prefix_caching: false
      max_num_batched_tokens: 32768
      distributed_executor_backend: "mp"
      custom_process_next_stage_input_func: vllm_omni.model_executor.stage_input_processors.qwen3_omni.talker2code2wav_async_chunk
    runtime:
      devices: "1"

  - stage_id: 2
    engine_args:
      model_arch: Qwen3OmniMoeForConditionalGeneration
      max_num_seqs: 64
      gpu_memory_utilization: 0.1
      enforce_eager: true
      trust_remote_code: true
      async_scheduling: false
      enable_prefix_caching: false
      engine_output_type: audio
      distributed_executor_backend: "mp"
      max_num_batched_tokens: 51200
    runtime:
      devices: "1"

# Platform overrides — only what differs from CUDA defaults above.
platforms:
  npu:  # verified on 5x A2/A3-64G NPUs
    stages:
      - stage_id: 0
        engine_args:
          gpu_memory_utilization: 0.6
          tensor_parallel_size: 2
        runtime:
          devices: "0,1"
      - stage_id: 1
        engine_args:
          gpu_memory_utilization: 0.6
          enforce_eager: true
        runtime:
          devices: "2"
      - stage_id: 2
        engine_args:
          gpu_memory_utilization: 0.3
        runtime:
          devices: "2"

  rocm:  # verified on 2x H100-80G ROCm
    stages:
      - stage_id: 0
        engine_args:
          enforce_eager: true

  xpu:  # verified on 8x Arc Pro B60
    stages:
      - stage_id: 0
        engine_args:
          tensor_parallel_size: 4
          enforce_eager: true
          max_cudagraph_capture_size: 0
        runtime:
          devices: "0,1,2,3"
      - stage_id: 1
        engine_args:
          enforce_eager: true
          max_cudagraph_capture_size: 0
        runtime:
          devices: "4"
      - stage_id: 2
        engine_args:
          gpu_memory_utilization: 0.3
          max_cudagraph_capture_size: 0
        runtime:
          devices: "4"
