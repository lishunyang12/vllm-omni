# Deploy config for Qwen3-Omni-MoE — CUDA defaults + platform overrides.
# All fields here are overridable by CLI.
#
# Verified on 2x H100-80G GPUs.

async_chunk: true

stages:
  - stage_id: 0
    gpu_memory_utilization: 0.9
    max_num_seqs: 64
    tensor_parallel_size: 1
    enforce_eager: false
    trust_remote_code: true
    distributed_executor_backend: "mp"
    enable_prefix_caching: false
    max_num_batched_tokens: 32768
    devices: "0"
    sampling_params:
      temperature: 0.4
      top_p: 0.9
      top_k: 1
      max_tokens: 2048
      seed: 42
      repetition_penalty: 1.05

  - stage_id: 1
    gpu_memory_utilization: 0.6
    max_num_seqs: 64
    enforce_eager: false
    trust_remote_code: true
    enable_prefix_caching: false
    max_num_batched_tokens: 32768
    distributed_executor_backend: "mp"
    devices: "1"
    sampling_params:
      temperature: 0.9
      top_k: 50
      max_tokens: 4096
      seed: 42
      repetition_penalty: 1.05

  - stage_id: 2
    gpu_memory_utilization: 0.1
    max_num_seqs: 1
    enforce_eager: true
    trust_remote_code: true
    async_scheduling: false
    enable_prefix_caching: false
    distributed_executor_backend: "mp"
    max_num_batched_tokens: 10000
    devices: "1"
    sampling_params:
      temperature: 0.0
      top_p: 1.0
      top_k: -1
      seed: 42
      repetition_penalty: 1.1

# Platform overrides — only what differs from CUDA defaults above.
platforms:
  npu:
    stages:
      - stage_id: 0
        gpu_memory_utilization: 0.6
        tensor_parallel_size: 2
        devices: "0,1"
      - stage_id: 1
        gpu_memory_utilization: 0.6
        enforce_eager: true
        devices: "2"
      - stage_id: 2
        gpu_memory_utilization: 0.3
        devices: "2"

  rocm:
    stages:
      - stage_id: 0
        enforce_eager: true

  xpu:
    stages:
      - stage_id: 0
        tensor_parallel_size: 4
        enforce_eager: true
        max_cudagraph_capture_size: 0
        devices: "0,1,2,3"
      - stage_id: 1
        enforce_eager: true
        max_cudagraph_capture_size: 0
        devices: "4"
      - stage_id: 2
        gpu_memory_utilization: 0.3
        max_cudagraph_capture_size: 0
        devices: "4"
