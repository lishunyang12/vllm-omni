# CI deploy — minimal resources, dummy weights.
# CUDA defaults; rocm/xpu deltas under platforms: are applied automatically.
base_config: ../qwen2_5_omni.yaml

stages:
  - stage_id: 0
    max_model_len: 16384
    max_num_batched_tokens: 16384
    max_num_seqs: 1
    gpu_memory_utilization: 0.9
    skip_mm_profiling: true
    load_format: dummy
    default_sampling_params:
      max_tokens: 128

  - stage_id: 1
    max_model_len: 16384
    max_num_batched_tokens: 16384
    max_num_seqs: 1
    gpu_memory_utilization: 0.4
    skip_mm_profiling: true
    load_format: dummy
    default_sampling_params:
      max_tokens: 4096

  - stage_id: 2
    max_num_seqs: 1
    gpu_memory_utilization: 0.5
    max_num_batched_tokens: 8192
    max_model_len: 8192
    load_format: dummy
    devices: "2"
    default_sampling_params:
      max_tokens: 8192

platforms:
  rocm:
    stages:
      - stage_id: 0
        gpu_memory_utilization: 0.9
      - stage_id: 1
        gpu_memory_utilization: 0.4
      - stage_id: 2
        gpu_memory_utilization: 0.5
        devices: "2"

  xpu:
    stages:
      - stage_id: 0
        gpu_memory_utilization: 0.9
        max_num_batched_tokens: 16384
        max_model_len: 16384
      - stage_id: 1
        gpu_memory_utilization: 0.5
      - stage_id: 2
        gpu_memory_utilization: 0.3
        max_num_batched_tokens: 4096
        max_model_len: 4096
        devices: "2"
