# CI deploy — minimal resources, dummy weights.
base_config: ../../qwen3_omni_moe.yaml

stages:
  - stage_id: 0
    max_num_seqs: 5
    max_model_len: 32768
    mm_processor_cache_gb: 0
    load_format: dummy
    default_sampling_params:
      max_tokens: 150
      ignore_eos: false

  - stage_id: 1
    gpu_memory_utilization: 0.5
    max_num_seqs: 5
    max_model_len: 32768
    load_format: dummy
    default_sampling_params:
      max_tokens: 1000

  - stage_id: 2
    max_num_seqs: 5
    max_num_batched_tokens: 100000
    load_format: dummy
    default_sampling_params:
      max_tokens: 2000
