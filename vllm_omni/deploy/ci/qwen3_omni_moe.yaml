# CI overlay for Qwen3-Omni-MoE — inherits from the production deploy
# (``../qwen3_omni_moe.yaml``) via ``base_config:`` and overrides only
# the fields that need to be CI-friendly:
#   - ``load_format: dummy`` so CI doesn't download weights from HF
#   - smaller ``max_num_seqs`` / ``max_model_len`` so the engine fits on
#     the CI hardware budget
#   - ``mm_processor_cache_gb: 0`` to avoid mmap caches in /dev/shm
#
# Why two files instead of one: the production deploy is what end users
# get when they run ``vllm serve ... --omni`` and must reflect the real
# model defaults. The CI overlay is what the test runner picks up via
# ``tests.utils.get_deploy_config_path("ci/qwen3_omni_moe.yaml")`` and
# only matters during testing. Inheritance keeps them DRY — only the
# CI-specific deltas are duplicated.

base_config: ../qwen3_omni_moe.yaml

stages:
  - stage_id: 0
    max_num_seqs: 5
    max_model_len: 32768
    mm_processor_cache_gb: 0
    load_format: dummy
    default_sampling_params:
      max_tokens: 150
      ignore_eos: false

  - stage_id: 1
    gpu_memory_utilization: 0.5
    max_num_seqs: 5
    max_model_len: 32768
    load_format: dummy
    default_sampling_params:
      max_tokens: 1000

  - stage_id: 2
    max_num_seqs: 5
    max_num_batched_tokens: 100000
    load_format: dummy
    default_sampling_params:
      max_tokens: 2000

platforms:
  rocm:
    stages:
      - stage_id: 0
        max_num_seqs: 1
        default_sampling_params:
          max_tokens: 100
      - stage_id: 1
        max_num_seqs: 1
        enforce_eager: true
        default_sampling_params:
          max_tokens: 100
      - stage_id: 2
        max_num_seqs: 1
        max_num_batched_tokens: 1000000
        default_sampling_params:
          max_tokens: 200

  xpu:
    stages:
      - stage_id: 0
        gpu_memory_utilization: 0.85
        max_num_seqs: 1
        tensor_parallel_size: 4
        enforce_eager: true
        max_num_batched_tokens: 4096
        max_model_len: 4096
        max_cudagraph_capture_size: 0
        skip_mm_profiling: true
        devices: "0,1,2,3"
        default_sampling_params:
          max_tokens: 100
          ignore_eos: false
      - stage_id: 1
        gpu_memory_utilization: 0.6
        max_num_seqs: 1
        enforce_eager: true
        max_num_batched_tokens: 4096
        max_model_len: 4096
        max_cudagraph_capture_size: 0
        skip_mm_profiling: true
        devices: "4"
      - stage_id: 2
        gpu_memory_utilization: 0.3
        max_num_seqs: 1
        max_num_batched_tokens: 100000
        max_cudagraph_capture_size: 0
        skip_mm_profiling: true
        devices: "5"
        default_sampling_params:
          max_tokens: 2000
