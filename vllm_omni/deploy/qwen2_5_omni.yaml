# Deploy config for Qwen2.5-Omni — CUDA defaults + platform overrides.
# Verified on 2x H100-80G GPUs (stages 0/1 on separate GPUs, stage 2
# colocated with stage 0).
#
# Stage 0 (thinker) and stage 2 (token2wav) share cuda:0. Stage 2's
# flashinfer kernel warmup spikes to ~27 GiB *transient* memory in the
# token2wav DiT forward pass — well above token2wav's steady-state need
# (~10 GiB). The spike has to fit alongside stage 0's reserved budget,
# so on an 80 GiB H100:
#   stage 0 budget = 0.48  → 38 GiB reserved
#   stage 2 baseline       ≈ 10 GiB
#   free for warmup spike  ≈ 79 - 38 - 10 = 31 GiB  (need 27, margin 4)
# Stage 2's gpu_memory_utilization=0.40 is the *cap*, not the reservation
# — vLLM only grows into it if KV cache profiling demands it, which
# token2wav doesn't.

stages:
  - stage_id: 0
    max_num_seqs: 1
    gpu_memory_utilization: 0.48
    enforce_eager: true
    max_num_batched_tokens: 32768
    mm_processor_cache_gb: 0
    devices: "0"
    default_sampling_params:
      temperature: 0.0
      top_p: 1.0
      top_k: -1
      max_tokens: 2048
      seed: 42
      repetition_penalty: 1.1

  - stage_id: 1
    max_num_seqs: 1
    gpu_memory_utilization: 0.8
    enforce_eager: true
    max_num_batched_tokens: 32768
    devices: "1"
    default_sampling_params:
      temperature: 0.9
      top_p: 0.8
      top_k: 40
      max_tokens: 2048
      seed: 42
      repetition_penalty: 1.05

  - stage_id: 2
    max_num_seqs: 1
    gpu_memory_utilization: 0.40
    enforce_eager: true
    max_num_batched_tokens: 32768
    async_scheduling: false
    devices: "0"
    default_sampling_params:
      temperature: 0.0
      top_p: 1.0
      top_k: -1
      max_tokens: 2048
      seed: 42
      repetition_penalty: 1.1

platforms:
  npu:
    stages:
      # NPU has cudagraph support for the thinker, unlike GPU which still
      # only runs eager.
      - stage_id: 0
        enforce_eager: false
      - stage_id: 2
        # 3-NPU layout: stage 2 lives on its own card.
        devices: "2"

  rocm:
    stages:
      - stage_id: 2
        # 3-GPU MI325 layout: stage 2 on a separate card.
        devices: "2"

  xpu:
    stages:
      # Verified on 2x Intel Arc Pro B60. Both AR stages use cudagraphs.
      - stage_id: 0
        gpu_memory_utilization: 0.9
        enforce_eager: false
      - stage_id: 1
        gpu_memory_utilization: 0.5
        enforce_eager: false
      - stage_id: 2
        gpu_memory_utilization: 0.3
        # Stage 2 colocates with stage 1's device on XPU.
        devices: "1"
