# Qwen2.5-Omni deploy: CUDA defaults + platform overrides, verified on 2x H100.
# Stage 2 disables flashinfer autotune because its DiT block never invokes
# flashinfer; the autotune dummy run OOMs the shared cuda:0 device otherwise.
async_chunk: true

stages:
  - stage_id: 0
    max_num_seqs: 1
    gpu_memory_utilization: 0.8
    enforce_eager: true
    mm_processor_cache_gb: 0
    default_sampling_params:
      temperature: 0.0
      top_p: 1.0
      top_k: -1
      max_tokens: 2048
      seed: 42
      repetition_penalty: 1.1

  - stage_id: 1
    max_num_seqs: 1
    gpu_memory_utilization: 0.8
    enforce_eager: true
    devices: "1"
    default_sampling_params:
      temperature: 0.9
      top_p: 0.8
      top_k: 40
      max_tokens: 2048
      seed: 42
      repetition_penalty: 1.05

  - stage_id: 2
    max_num_seqs: 1
    gpu_memory_utilization: 0.15
    enforce_eager: true
    enable_flashinfer_autotune: false
    async_scheduling: false
    default_sampling_params:
      temperature: 0.0
      top_p: 1.0
      top_k: -1
      max_tokens: 2048
      seed: 42
      repetition_penalty: 1.1

platforms:
  npu:
    stages:
      # NPU has cudagraph support for the thinker, unlike GPU which still
      # only runs eager.
      - stage_id: 0
        enforce_eager: false
      - stage_id: 2
        # 3-NPU layout: stage 2 lives on its own card.
        devices: "2"

  rocm:
    stages:
      - stage_id: 2
        # 3-GPU MI325 layout: stage 2 on a separate card.
        devices: "2"

  xpu:
    stages:
      # Verified on 2x Intel Arc Pro B60. Both AR stages use cudagraphs.
      - stage_id: 0
        gpu_memory_utilization: 0.9
        enforce_eager: false
      - stage_id: 1
        gpu_memory_utilization: 0.5
        enforce_eager: false
      - stage_id: 2
        gpu_memory_utilization: 0.3
        # Stage 2 colocates with stage 1's device on XPU.
        devices: "1"
