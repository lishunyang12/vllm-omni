# Deploy config for Qwen2.5-Omni — CUDA defaults + platform overrides.
# Verified on 2x H100-80G GPUs (stages 0/1 on separate GPUs, stage 2
# colocated with stage 0).

stages:
  - stage_id: 0
    max_num_seqs: 1
    gpu_memory_utilization: 0.8
    enforce_eager: true
    max_num_batched_tokens: 32768
    mm_processor_cache_gb: 0
    devices: "0"
    default_sampling_params:
      temperature: 0.0
      top_p: 1.0
      top_k: -1
      max_tokens: 2048
      seed: 42
      repetition_penalty: 1.1

  - stage_id: 1
    max_num_seqs: 1
    gpu_memory_utilization: 0.8
    enforce_eager: true
    max_num_batched_tokens: 32768
    devices: "1"
    default_sampling_params:
      temperature: 0.9
      top_p: 0.8
      top_k: 40
      max_tokens: 2048
      seed: 42
      repetition_penalty: 1.05

  - stage_id: 2
    max_num_seqs: 1
    gpu_memory_utilization: 0.15
    enforce_eager: true
    max_num_batched_tokens: 32768
    async_scheduling: false
    devices: "0"
    default_sampling_params:
      temperature: 0.0
      top_p: 1.0
      top_k: -1
      max_tokens: 2048
      seed: 42
      repetition_penalty: 1.1

platforms:
  rocm:
    stages:
      - stage_id: 0
        gpu_memory_utilization: 0.8
      - stage_id: 1
        gpu_memory_utilization: 0.8
      - stage_id: 2
        gpu_memory_utilization: 0.15

  xpu:
    stages:
      - stage_id: 0
        gpu_memory_utilization: 0.9
      - stage_id: 1
        gpu_memory_utilization: 0.5
      - stage_id: 2
        gpu_memory_utilization: 0.3
