async_chunk: false

# OmniGen2 splits CFG into text/image guidance; surface both with their pipeline defaults.
stages:
  - stage_id: 0
    gpu_memory_utilization: 0.9
    devices: "0"
    enforce_eager: true
    default_sampling_params:
      seed: 42
      num_inference_steps: 28
      text_guidance_scale: 4.0
      image_guidance_scale: 1.0
