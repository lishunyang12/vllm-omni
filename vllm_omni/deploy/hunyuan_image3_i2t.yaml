# HunyuanImage-3.0 image-to-text — single AR stage on 4 GPUs.
pipeline: hunyuan_image3_i2t
trust_remote_code: true
distributed_executor_backend: mp

stages:
  - stage_id: 0
    max_num_seqs: 1
    gpu_memory_utilization: 0.95
    enforce_eager: true
    tensor_parallel_size: 4
    devices: "0,1,2,3"
    hf_overrides:
      rope_parameters:
        mrope_section: [0, 32, 32]
        rope_type: default
    default_sampling_params:
      temperature: 0.0
      top_p: 0.95
      top_k: 1024
      max_tokens: 2048
      stop_token_ids: [127957, 128026]
