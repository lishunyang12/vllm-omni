# Stage config for running Wan2.2 TI2V-5B DiT with ModelOpt NVFP4 auto-detect.
# Single GPU (TI2V-5B fits 80GB BF16; NVFP4 drops by ~75%).
# For the A14B MoE variants, bump `tensor_parallel_size` and `devices`.
#
# Use with a ModelOpt NVFP4 checkpoint (e.g. produced by
# examples/quantization/quantize_wan2_2_modelopt_nvfp4.py).
#
# NOTE: Serving requires Blackwell (sm_100 B200 / sm_120 RTX 5090 / RTX PRO 6000).
# NVFP4 kernels are not available on H100 / Ada / Ampere.

stage_args:
  - stage_id: 0
    stage_type: diffusion
    runtime:
      devices: "0"
      max_batch_size: 1
    engine_args:
      model_stage: dit
      model_class_name: Wan22TI2VPipeline
      max_num_seqs: 1
      enforce_eager: true
      trust_remote_code: true
      distributed_executor_backend: "mp"
      parallel_config:
        tensor_parallel_size: 1

    final_output: true
    final_output_type: video
    is_comprehension: false
    default_sampling_params:
      seed: 42

runtime:
  enabled: true
  defaults:
    window_size: -1
    max_inflight: 1
