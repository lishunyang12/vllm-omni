# VoxCPM2 single-stage config.
# Uses native VoxCPM.generate() which runs the full pipeline
# (TSLM → FSQ → LocEnc → RALM → LocDiT → AudioVAE V2) internally.
stage_args:
  - stage_id: 0
    stage_type: llm
    is_comprehension: true
    runtime:
      devices: "0"
      max_batch_size: 1
    engine_args:
      dtype: bfloat16
      model_stage: full_pipeline
      model_arch: VoxCPM2ForConditionalGeneration
      worker_type: ar
      scheduler_cls: vllm_omni.core.sched.omni_ar_scheduler.OmniARScheduler
      enforce_eager: true
      trust_remote_code: true
      async_scheduling: true
      enable_prefix_caching: false
      engine_output_type: audio
      gpu_memory_utilization: 0.85
      distributed_executor_backend: "mp"
      max_num_batched_tokens: 4096
      max_model_len: 4096
    default_sampling_params:
      temperature: 0.0
      top_p: 1.0
      top_k: -1
      max_tokens: 4096
      seed: 42
      detokenize: false
      repetition_penalty: 1.0
    final_output: true
    final_output_type: audio
