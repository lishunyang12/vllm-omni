# Full 3-stage Qwen3-Omni pipeline with FP8 thinker on a single GPU
# Total memory budget: ~64GB (simulating A100-64GB / L40S deployment)
# Tested on H200 141GB with constrained gpu_memory_utilization
#
# Memory breakdown:
#   Thinker (FP8):  ~31.4 GiB weights + ~10 GiB KV cache = ~42 GiB
#   Talker (BF16):  ~6 GiB weights + ~3 GiB KV cache     = ~9 GiB
#   Code2Wav:       ~1 GiB weights + ~2 GiB runtime       = ~3 GiB
#   CUDA overhead:  ~5 GiB
#   Total:          ~59 GiB (within 64GB budget)

async_chunk: false
stage_args:
  - stage_id: 0
    stage_type: llm
    runtime:
      devices: "0"
      max_batch_size: 64
    engine_args:
      model: /root/.cache/modelscope/hub/models/asdazd/Qwen3-Omni-30B-A3B-Instruct_modelopt_FP8
      model_stage: thinker
      model_arch: Qwen3OmniMoeForConditionalGeneration
      worker_type: ar
      scheduler_cls: vllm_omni.core.sched.omni_ar_scheduler.OmniARScheduler
      gpu_memory_utilization: 0.30  # ~42 GiB on H200
      enforce_eager: true
      trust_remote_code: true
      engine_output_type: latent
      distributed_executor_backend: "mp"
      enable_prefix_caching: false
      max_num_batched_tokens: 4096
      max_model_len: 4096
      hf_config_name: thinker_config
      tensor_parallel_size: 1
    final_output: true
    final_output_type: text
    is_comprehension: true
    default_sampling_params:
      temperature: 0.4
      top_p: 0.9
      top_k: 1
      max_tokens: 2048
      seed: 42
      detokenize: True
      repetition_penalty: 1.05

  - stage_id: 1
    stage_type: llm
    runtime:
      devices: "0"
      max_batch_size: 64
    engine_args:
      model: /root/.cache/modelscope/hub/models/asdazd/Qwen3-Omni-30B-A3B-Instruct_modelopt_FP8
      model_stage: talker
      model_arch: Qwen3OmniMoeForConditionalGeneration
      worker_type: ar
      scheduler_cls: vllm_omni.core.sched.omni_ar_scheduler.OmniARScheduler
      gpu_memory_utilization: 0.065  # ~9 GiB on H200
      enforce_eager: true
      trust_remote_code: true
      engine_output_type: latent
      enable_prefix_caching: false
      max_num_batched_tokens: 4096
      distributed_executor_backend: "mp"
      hf_config_name: talker_config
    engine_input_source: [0]
    custom_process_input_func: vllm_omni.model_executor.stage_input_processors.qwen3_omni.thinker2talker
    default_sampling_params:
      temperature: 0.9
      top_k: 50
      max_tokens: 4096
      seed: 42
      detokenize: False
      repetition_penalty: 1.05
      stop_token_ids: [2150]

  - stage_id: 2
    stage_type: llm
    runtime:
      devices: "0"
      max_batch_size: 32
    engine_args:
      model: /root/.cache/modelscope/hub/models/asdazd/Qwen3-Omni-30B-A3B-Instruct_modelopt_FP8
      model_stage: code2wav
      model_arch: Qwen3OmniMoeForConditionalGeneration
      worker_type: generation
      scheduler_cls: vllm_omni.core.sched.omni_generation_scheduler.OmniGenerationScheduler
      enforce_eager: true
      trust_remote_code: true
      async_scheduling: false
      enable_prefix_caching: false
      engine_output_type: audio
      gpu_memory_utilization: 0.02  # ~3 GiB on H200
      distributed_executor_backend: "mp"
      max_num_batched_tokens: 1000000
      hf_config_name: thinker_config
    engine_input_source: [1]
    custom_process_input_func: vllm_omni.model_executor.stage_input_processors.qwen3_omni.talker2code2wav
    final_output: true
    final_output_type: audio
    default_sampling_params:
      temperature: 0.0
      top_p: 1.0
      top_k: -1
      max_tokens: 65536
      seed: 42
      detokenize: True
      repetition_penalty: 1.1
