# ROCm CI deploy config for Qwen3-Omni-MoE — minimal resources, dummy weights.

async_chunk: true

connectors:
  connector_of_shared_memory:
    name: SharedMemoryConnector
    extra:
      codec_chunk_frames: 25
      codec_left_context_frames: 25

edges:
  - from: 0
    to: 1
    window_size: -1
  - from: 1
    to: 2
    window_size: -1

stages:
  - stage_id: 0
    gpu_memory_utilization: 0.9
    max_num_seqs: 1
    tensor_parallel_size: 1
    enforce_eager: false
    trust_remote_code: true
    distributed_executor_backend: "mp"
    enable_prefix_caching: false
    mm_processor_cache_gb: 0
    load_format: dummy
    devices: "0"
    output_connectors:
      to_stage_1: connector_of_shared_memory
    default_sampling_params:
      max_tokens: 100
      temperature: 0.4
      top_p: 0.9
      top_k: 1
      seed: 42
      repetition_penalty: 1.05

  - stage_id: 1
    gpu_memory_utilization: 0.6
    max_num_seqs: 1
    enforce_eager: true
    trust_remote_code: true
    enable_prefix_caching: false
    distributed_executor_backend: "mp"
    load_format: dummy
    devices: "1"
    input_connectors:
      from_stage_0: connector_of_shared_memory
    default_sampling_params:
      max_tokens: 100
      temperature: 0.9
      top_k: 50
      seed: 42
      repetition_penalty: 1.05

  - stage_id: 2
    gpu_memory_utilization: 0.1
    max_num_seqs: 1
    enforce_eager: true
    trust_remote_code: true
    enable_prefix_caching: false
    distributed_executor_backend: "mp"
    max_num_batched_tokens: 1000000
    async_scheduling: false
    load_format: dummy
    devices: "1"
    default_sampling_params:
      max_tokens: 200
      temperature: 0.0
      top_p: 1.0
      top_k: -1
      seed: 42
      repetition_penalty: 1.1
