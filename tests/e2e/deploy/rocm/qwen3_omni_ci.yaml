# ROCm CI deploy — minimal resources, dummy weights.
base_config: ../../../../vllm_omni/deploy/qwen3_omni_moe.yaml

stages:
  - stage_id: 0
    max_num_seqs: 1
    mm_processor_cache_gb: 0
    load_format: dummy
    default_sampling_params:
      max_tokens: 100

  - stage_id: 1
    max_num_seqs: 1
    enforce_eager: true
    load_format: dummy
    default_sampling_params:
      max_tokens: 100

  - stage_id: 2
    max_num_seqs: 1
    max_num_batched_tokens: 1000000
    load_format: dummy
    default_sampling_params:
      max_tokens: 200
