# XPU CI deploy config for Qwen3-Omni-MoE — verified on 8x Intel Arc Pro B60.

stages:
  - stage_id: 0
    engine_args:
      max_num_seqs: 1
      model_arch: Qwen3OmniMoeForConditionalGeneration
      gpu_memory_utilization: 0.85
      skip_mm_profiling: true
      enforce_eager: true
      trust_remote_code: true
      engine_output_type: latent
      distributed_executor_backend: "mp"
      max_num_batched_tokens: 4096
      max_model_len: 4096
      enable_prefix_caching: false
      hf_config_name: thinker_config
      tensor_parallel_size: 4
      max_cudagraph_capture_size: 0
      custom_process_next_stage_input_func: vllm_omni.model_executor.stage_input_processors.qwen3_omni.thinker2talker_async_chunk
    runtime:
      devices: "0,1,2,3"
    sampling_params:
      max_tokens: 100
      ignore_eos: false

  - stage_id: 1
    engine_args:
      max_num_seqs: 1
      model_arch: Qwen3OmniMoeForConditionalGeneration
      gpu_memory_utilization: 0.6
      skip_mm_profiling: true
      enforce_eager: true
      trust_remote_code: true
      engine_output_type: latent
      enable_prefix_caching: false
      max_num_batched_tokens: 4096
      max_model_len: 4096
      distributed_executor_backend: "mp"
      hf_config_name: talker_config
      max_cudagraph_capture_size: 0
      custom_process_next_stage_input_func: vllm_omni.model_executor.stage_input_processors.qwen3_omni.talker2code2wav_async_chunk
    runtime:
      devices: "4"

  - stage_id: 2
    engine_args:
      max_num_seqs: 1
      model_arch: Qwen3OmniMoeForConditionalGeneration
      enforce_eager: true
      trust_remote_code: true
      enable_prefix_caching: false
      engine_output_type: audio
      gpu_memory_utilization: 0.3
      skip_mm_profiling: true
      distributed_executor_backend: "mp"
      max_num_batched_tokens: 100000
      hf_config_name: thinker_config
      async_scheduling: false
      max_cudagraph_capture_size: 0
    runtime:
      devices: "5"
    sampling_params:
      max_tokens: 2000
