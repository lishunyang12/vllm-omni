# DFX stability testing deploy config for Qwen3-Omni-MoE.
# Model-intrinsic fields (model_arch, engine_output_type, hf_config_name,
# custom_process_next_stage_input_func) live in pipeline.py.

async_chunk: true

connectors:
  connector_of_shared_memory:
    name: SharedMemoryConnector
    extra:
      codec_chunk_frames: 25
      codec_left_context_frames: 25

edges:
  - from: 0
    to: 1
    window_size: -1
  - from: 1
    to: 2
    window_size: -1

stages:
  - stage_id: 0
    gpu_memory_utilization: 0.9
    max_num_seqs: 64
    tensor_parallel_size: 1
    enforce_eager: false
    trust_remote_code: true
    distributed_executor_backend: "mp"
    enable_prefix_caching: false
    max_num_batched_tokens: 32768
    devices: "0"
    output_connectors:
      to_stage_1: connector_of_shared_memory
    default_sampling_params:
      temperature: 0.4
      top_p: 0.9
      top_k: 1
      max_tokens: 2048
      seed: 42
      repetition_penalty: 1.05

  - stage_id: 1
    gpu_memory_utilization: 0.6
    max_num_seqs: 64
    enforce_eager: false
    trust_remote_code: true
    enable_prefix_caching: false
    max_num_batched_tokens: 32768
    distributed_executor_backend: "mp"
    devices: "1"
    input_connectors:
      from_stage_0: connector_of_shared_memory
    default_sampling_params:
      temperature: 0.9
      top_k: 50
      max_tokens: 4096
      seed: 42
      repetition_penalty: 1.05

  - stage_id: 2
    gpu_memory_utilization: 0.1
    max_num_seqs: 64
    enforce_eager: true
    trust_remote_code: true
    async_scheduling: false
    enable_prefix_caching: false
    distributed_executor_backend: "mp"
    max_num_batched_tokens: 1000000
    devices: "1"
    default_sampling_params:
      temperature: 0.0
      top_p: 1.0
      top_k: -1
      max_tokens: 65536
      seed: 42
      repetition_penalty: 1.1
